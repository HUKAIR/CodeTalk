name: test

on:
  push:
  pull_request:
  workflow_call:

permissions:
  contents: read

jobs:
  python:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package
        run: python -m pip install -e ".[web,test]"
      - name: Run tests
        run: python -m unittest discover -s tests

  release-gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.14"
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: vscode-codetalk/package-lock.json
      - name: Install core package and build tooling
        run: python -m pip install -e . build
      - name: Scan repository history for secrets
        run: python -m scripts.scan_secrets --history
      - name: Verify static pages have no external dependencies
        run: >-
          python -m scripts.check_static_no_external
          codetalk/web_chat.html codetalk/console.html codetalk/tunnel.html
          codetalk/course.html codetalk/graph.html codetalk/trust_ab.html
      - name: Build MCP bundle
        run: python -m scripts.build_mcpb
      - name: Build reproducible Python distributions
        run: |
          export SOURCE_DATE_EPOCH="$(git log -1 --format=%ct)"
          python -m build
          mkdir -p /tmp/codetalk-rebuild
          python -m build --outdir /tmp/codetalk-rebuild
          python -c "from scripts.release_artifacts import normalize_sdist; normalize_sdist('dist/codetalk-0.2.2.tar.gz', '$SOURCE_DATE_EPOCH'); normalize_sdist('/tmp/codetalk-rebuild/codetalk-0.2.2.tar.gz', '$SOURCE_DATE_EPOCH')"
          cmp dist/codetalk-0.2.2-py3-none-any.whl /tmp/codetalk-rebuild/codetalk-0.2.2-py3-none-any.whl
          cmp dist/codetalk-0.2.2.tar.gz /tmp/codetalk-rebuild/codetalk-0.2.2.tar.gz
      - name: Build editor package for candidate
        working-directory: vscode-codetalk
        run: |
          npm ci
          npm run typecheck
          npm run build
          npm run package
      - name: Assemble and validate release candidate
        run: |
          cp vscode-codetalk/vscode-codetalk-0.2.2.vsix dist/vscode-codetalk-0.2.2.vsix
          export SOURCE_DATE_EPOCH="$(git log -1 --format=%ct)"
          python -m scripts.release_artifacts dist
          cd dist
          sha256sum -c SHA256SUMS
      - name: Smoke-test built wheel
        run: |
          python -m pip install --force-reinstall --no-deps dist/*.whl
          python -P -m codetalk --version
      - name: Validate candidate before artifact upload
        run: >-
          python -m scripts.release_promotion validate-candidate
          dist docs/releases/v0.2.2.md
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: codetalk-release-candidate-${{ github.sha }}
          path: dist/*
          if-no-files-found: error
          retention-days: 7

  vscode-extension:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: vscode-codetalk
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: vscode-codetalk/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Prepare package license
        run: npm run prepackage
      - name: Verify package license
        run: test -f LICENSE
      - name: Typecheck
        run: npm run typecheck
      - name: Build
        run: npm run build
      - name: Package VSIX
        run: npm run package
      - name: Verify VSIX archive
        run: unzip -t vscode-codetalk-0.2.2.vsix
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: codetalk-vsix
          path: vscode-codetalk/vscode-codetalk-0.2.2.vsix
