<!DOCTYPE html>
<html lang="zh"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>vibetrace · 接地对话</title>
<style>
  :root{--bg:#0d0d0f;--fg:#e8e8ea;--dim:#8b8b92;--line:#26262b;--card:#16161a;
    --accent:#5b9cff;--warn:#e0a44a;--mono:"SF Mono",ui-monospace,Menlo,monospace}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--fg);
    font:15px/1.6 -apple-system,"PingFang SC","Microsoft YaHei",system-ui,sans-serif}
  header{padding:12px 20px;border-bottom:1px solid var(--line);font-family:var(--mono);
    font-size:12px;color:var(--dim);letter-spacing:.04em}
  header b{color:var(--fg);letter-spacing:.12em}
  main{max-width:820px;margin:0 auto;padding:20px;display:flex;flex-direction:column;
    min-height:calc(100vh - 46px)}
  #log{flex:1}
  .msg{margin:14px 0}
  .msg .who{font-family:var(--mono);font-size:11px;color:var(--dim);text-transform:uppercase}
  .msg.user .body{color:var(--fg)}
  .msg.bot .body{background:var(--card);border:1px solid var(--line);border-radius:10px;
    padding:12px 14px;white-space:pre-wrap}
  .badge{font-family:var(--mono);font-size:11px;color:var(--warn);margin-left:8px}
  .cites{margin-top:8px;display:flex;flex-wrap:wrap;gap:6px}
  .cite{font-family:var(--mono);font-size:11px;color:var(--accent);
    border:1px solid var(--line);border-radius:6px;padding:2px 8px}
  form{display:flex;gap:8px;position:sticky;bottom:0;background:var(--bg);
    padding:12px 0;border-top:1px solid var(--line)}
  textarea{flex:1;background:var(--card);color:var(--fg);border:1px solid var(--line);
    border-radius:8px;padding:10px;font:inherit;resize:vertical;min-height:44px}
  button{background:var(--accent);color:#fff;border:0;border-radius:8px;padding:0 18px;
    font:inherit;cursor:pointer}
  button:disabled{opacity:.5;cursor:not-allowed}
  .hint{color:var(--dim);font-size:13px;margin:6px 0 0}
</style></head><body>
<header><span><b>VIBETRACE</b> // 接地对话 · 数据不出本机</span></header>
<main>
  <p class="hint">问「这段代码当初为什么这么写」——答案接地到真实 commit / 决策 / 会话原话;
    无 key 或 --no-llm 时降级为零-LLM 接地罗列(不出网)。</p>
  <div id="log"></div>
  <form id="f">
    <textarea id="q" placeholder="例:为什么把重试从装饰器改成显式循环?(可带 文件:行)"></textarea>
    <button id="send" type="submit">问</button>
  </form>
</main>
<script>
var convId = "web-" + Date.now();
var turn = 0;
var log = document.getElementById("log");

function esc(s){ return String(s == null ? "" : s)
  .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

function add(who, cls){
  var d = document.createElement("div");
  d.className = "msg " + cls;
  d.innerHTML = '<div class="who">' + who + '</div><div class="body"></div>';
  log.appendChild(d);
  return d.querySelector(".body");
}

document.getElementById("f").addEventListener("submit", function(e){
  e.preventDefault();
  var q = document.getElementById("q").value.trim();
  if (!q) return;
  add("你", "user").textContent = q;
  document.getElementById("q").value = "";
  var btn = document.getElementById("send"); btn.disabled = true;
  var body = add("vibetrace", "bot"); body.textContent = "…接地检索中";
  fetch("/api/chat", { method:"POST", headers:{"Content-Type":"application/json"},
    body: JSON.stringify({ question:q, conv_id:convId, turn_seq:turn++ }) })
    .then(function(r){ return r.json(); })
    .then(function(o){
      body.textContent = o.answer || "(无回答)";
      if (o.degraded){
        var b = document.createElement("span");
        b.className = "badge"; b.textContent = "零-LLM 接地(未调模型)";
        body.parentNode.querySelector(".who").appendChild(b);
      }
      var cites = o.citations || [];
      if (cites.length){
        var box = document.createElement("div"); box.className = "cites";
        cites.forEach(function(c){
          var s = document.createElement("span"); s.className = "cite";
          s.textContent = (c.kind === "conversation" ? "讨论·" : "") + (c.sha || c.id);
          box.appendChild(s);
        });
        body.parentNode.appendChild(box);
      }
    })
    .catch(function(){ body.textContent = "出错了(后端没起来?查 vibetrace web 终端)"; })
    .finally(function(){ btn.disabled = false; });
});
</script>
</body></html>
