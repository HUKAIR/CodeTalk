name: Prepare or publish CodeTalk 0.2.0

on:
  workflow_dispatch:
    inputs:
      publish:
        description: Publish the verified v0.2.0 tag to public services
        required: true
        type: boolean
        default: false

permissions:
  contents: read

env:
  VERSION: "0.2.0"
  TAG: "v0.2.0"

concurrency:
  group: codetalk-v0.2.0-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    uses: ./.github/workflows/test.yml
    permissions:
      contents: read

  candidate:
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.sha }}
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.14"
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: codetalk-release-candidate-${{ github.sha }}
          path: dist
      - name: Validate the exact candidate
        run: >-
          python -m scripts.release_promotion validate-candidate
          dist docs/releases/v0.2.0.md
      - name: Stage the public proof allowlist
        run: python -m scripts.release_promotion stage-pages . pages
      - name: Scan the source tree for secrets
        run: python -m scripts.scan_secrets
      - name: Verify public proof runtime boundaries
        run: python -m unittest tests.test_product_proof
      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: pages
          retention-days: 7

  preflight:
    if: ${{ inputs.publish }}
    needs: candidate
    runs-on: ubuntu-latest
    environment:
      name: release
    permissions:
      actions: read
      contents: read
      pages: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.sha }}
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.14"
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: codetalk-release-candidate-${{ github.sha }}
          path: dist
      - name: Revalidate candidate bytes
        run: >-
          python -m scripts.release_promotion validate-candidate
          dist docs/releases/v0.2.0.md
      - name: Verify tag identity and signature
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          test "$GITHUB_REF" = "refs/tags/v0.2.0"
          ref_json="$(gh api "repos/$GITHUB_REPOSITORY/git/ref/tags/$TAG")"
          test "$(jq -r '.object.type' <<<"$ref_json")" = "tag"
          tag_sha="$(jq -r '.object.sha' <<<"$ref_json")"
          tag_json="$(gh api "repos/$GITHUB_REPOSITORY/git/tags/$tag_sha")"
          test "$(jq -r '.verification.verified' <<<"$tag_json")" = "true"
          test "$(jq -r '.object.type' <<<"$tag_json")" = "commit"
          test "$(jq -r '.object.sha' <<<"$tag_json")" = "$GITHUB_SHA"
      - name: Verify immutable Releases and Pages settings
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          immutable="$(gh api "repos/$GITHUB_REPOSITORY/immutable-releases" --jq '.enabled')"
          test "$immutable" = "true"
          build_type="$(gh api "repos/$GITHUB_REPOSITORY/pages" --jq '.build_type')"
          test "$build_type" = "workflow"

  draft-release:
    needs: preflight
    runs-on: ubuntu-latest
    environment:
      name: release
    permissions:
      actions: read
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.sha }}
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.14"
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: codetalk-release-candidate-${{ github.sha }}
          path: dist
      - name: Validate candidate before draft creation
        run: >-
          python -m scripts.release_promotion validate-candidate
          dist docs/releases/v0.2.0.md
      - name: Create or verify the hidden draft
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          ASSETS=(
            codetalk-0.2.0-py3-none-any.whl
            codetalk-0.2.0.tar.gz
            codetalk-0.2.0.mcpb
            vscode-codetalk-0.2.0.vsix
            codetalk-0.2.0.sbom.cdx.json
            SHA256SUMS
          )
          if release_json="$(gh release view "$TAG" --json isDraft,body,assets 2>/dev/null)"; then
            test "$(jq -r '.isDraft' <<<"$release_json")" = "true"
            test "$(jq -r '.body' <<<"$release_json")" = "$(cat docs/releases/v0.2.0.md)"
            mkdir -p existing-assets
            mapfile -t existing < <(jq -r '.assets[].name' <<<"$release_json")
            for name in "${existing[@]}"; do
              known=false
              for expected in "${ASSETS[@]}"; do
                if test "$name" = "$expected"; then known=true; fi
              done
              test "$known" = "true"
              gh release download "$TAG" --pattern "$name" --dir existing-assets
              cmp "dist/$name" "existing-assets/$name"
            done
            for name in "${ASSETS[@]}"; do
              present=false
              for existing_name in "${existing[@]}"; do
                if test "$name" = "$existing_name"; then present=true; fi
              done
              if test "$present" = "false"; then
                gh release upload "$TAG" "dist/$name"
              fi
            done
          else
            gh release create "$TAG" \
              dist/codetalk-0.2.0-py3-none-any.whl \
              dist/codetalk-0.2.0.tar.gz \
              dist/codetalk-0.2.0.mcpb \
              dist/vscode-codetalk-0.2.0.vsix \
              dist/codetalk-0.2.0.sbom.cdx.json \
              dist/SHA256SUMS \
              --draft --verify-tag --title "CodeTalk 0.2.0" \
              --notes-file docs/releases/v0.2.0.md
          fi

  inspect-pypi:
    needs: draft-release
    runs-on: ubuntu-latest
    outputs:
      state: ${{ steps.inspect.outputs.state }}
    permissions:
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.sha }}
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.14"
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: codetalk-release-candidate-${{ github.sha }}
          path: dist
      - id: inspect
        name: Inspect public PyPI state
        run: |
          set -euo pipefail
          state="$(python -m scripts.release_promotion pypi-state dist)"
          test "$state" = "publish" -o "$state" = "verified"
          echo "state=$state" >> "$GITHUB_OUTPUT"

  publish-pypi:
    if: ${{ needs.inspect-pypi.outputs.state == 'publish' }}
    needs: inspect-pypi
    runs-on: ubuntu-latest
    environment:
      name: pypi
    permissions:
      actions: read
      contents: read
      id-token: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: codetalk-release-candidate-${{ github.sha }}
          path: dist
      - name: Isolate Python distribution files
        run: |
          mkdir -p pypi-dist
          cp dist/codetalk-0.2.0-py3-none-any.whl pypi-dist/
          cp dist/codetalk-0.2.0.tar.gz pypi-dist/
      - uses: pypa/gh-action-pypi-publish@ba38be9e461d3875417946c167d0b5f3d385a247 # v1.14.1
        with:
          packages-dir: pypi-dist/

  verify-pypi:
    if: >-
      ${{ always() && needs.inspect-pypi.result == 'success' &&
          (needs.publish-pypi.result == 'success' ||
           needs.publish-pypi.result == 'skipped') }}
    needs: [inspect-pypi, publish-pypi]
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.sha }}
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.14"
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: codetalk-release-candidate-${{ github.sha }}
          path: dist
      - name: Require public PyPI bytes to match
        run: |
          set -euo pipefail
          state=""
          for attempt in {1..12}; do
            state="$(python -m scripts.release_promotion pypi-state dist)"
            if test "$state" = "verified"; then break; fi
            sleep 10
          done
          test "$state" = "verified"

  publish-release:
    needs: verify-pypi
    runs-on: ubuntu-latest
    environment:
      name: release
    permissions:
      actions: read
      contents: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: codetalk-release-candidate-${{ github.sha }}
          path: dist
      - name: Publish and verify immutable Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          test "$(gh release view "$TAG" --json isDraft --jq '.isDraft')" = "true"
          gh release edit "$TAG" --draft=false --latest --verify-tag
          immutable="$(gh api "repos/$GITHUB_REPOSITORY/releases/tags/$TAG" --jq '.immutable')"
          test "$immutable" = "true"
          for attempt in {1..12}; do
            if gh release verify "$TAG"; then break; fi
            sleep 10
          done
          gh release verify "$TAG"
          gh release verify-asset "$TAG" dist/codetalk-0.2.0-py3-none-any.whl
          gh release verify-asset "$TAG" dist/codetalk-0.2.0.tar.gz
          gh release verify-asset "$TAG" dist/codetalk-0.2.0.mcpb
          gh release verify-asset "$TAG" dist/vscode-codetalk-0.2.0.vsix
          gh release verify-asset "$TAG" dist/codetalk-0.2.0.sbom.cdx.json
          gh release verify-asset "$TAG" dist/SHA256SUMS

  deploy-pages:
    needs: publish-release
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0

  verify-public:
    needs: deploy-pages
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      pages: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.sha }}
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.14"
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: codetalk-release-candidate-${{ github.sha }}
          path: dist
      - name: Verify public package and immutable assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          test "$(python -m scripts.release_promotion pypi-state dist)" = "verified"
          gh release verify "$TAG"
          for path in dist/*; do gh release verify-asset "$TAG" "$path"; done
      - name: Verify deployed Pages bytes
        env:
          PAGE_URL: ${{ needs.deploy-pages.outputs.page_url }}
        run: |
          set -euo pipefail
          python -m scripts.release_promotion stage-pages . pages
          page_root="${PAGE_URL%/}"
          curl --fail --location --retry 12 --retry-all-errors \
            "$page_root/" --output /tmp/codetalk-public-index.html
          curl --fail --location --retry 12 --retry-all-errors \
            "$page_root/docs/images/codetalk-logo-banner.png" \
            --output /tmp/codetalk-public-logo.png
          cmp pages/index.html /tmp/codetalk-public-index.html
          cmp pages/docs/images/codetalk-logo-banner.png \
            /tmp/codetalk-public-logo.png
      - name: Smoke-test the public PyPI install
        run: |
          set -euo pipefail
          python -m venv /tmp/codetalk-public-venv
          /tmp/codetalk-public-venv/bin/python -m pip install \
            --no-cache-dir --no-deps "codetalk==0.2.0"
          /tmp/codetalk-public-venv/bin/python -P -m codetalk --version
          mkdir -p /tmp/codetalk-public-home /tmp/codetalk-public-repo
          git -C /tmp/codetalk-public-repo init
          git -C /tmp/codetalk-public-repo config user.name "CodeTalk Release"
          git -C /tmp/codetalk-public-repo config user.email "release@example.invalid"
          printf 'value = 1\n' > /tmp/codetalk-public-repo/example.py
          git -C /tmp/codetalk-public-repo add example.py
          git -C /tmp/codetalk-public-repo commit -m "initial fixture"
          printf 'value = 2\n' > /tmp/codetalk-public-repo/example.py
          HOME=/tmp/codetalk-public-home \
            /tmp/codetalk-public-venv/bin/codetalk doctor \
            --project /tmp/codetalk-public-repo
          HOME=/tmp/codetalk-public-home \
            /tmp/codetalk-public-venv/bin/codetalk review --json \
            --project /tmp/codetalk-public-repo \
            > /tmp/codetalk-public-review.json
          python -c "import json; json.load(open('/tmp/codetalk-public-review.json'))"
