<!DOCTYPE html>
<html lang="zh"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CodeTalk · 接地对话</title>
<style>
  :root{--bg:#0d0d0f;--fg:#e8e8ea;--dim:#8b8b92;--line:#26262b;--card:#16161a;
    --accent:#5b9cff;--warn:#e0a44a;--mono:"SF Mono",ui-monospace,Menlo,monospace;
    --serif:"Iowan Old Style","Palatino Linotype",Palatino,"Book Antiqua",Georgia,"PingFang SC","Microsoft YaHei",serif}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--fg);font:15px/1.65 var(--serif)}
  header{padding:12px 20px;border-bottom:1px solid var(--line);font-family:var(--mono);
    font-size:12px;color:var(--dim);letter-spacing:.04em;display:flex;
    justify-content:space-between;align-items:center;gap:12px}
  header b{color:var(--fg);letter-spacing:.12em}
  header a{color:var(--accent);text-decoration:none}
  main{max-width:820px;margin:0 auto;padding:20px;display:flex;flex-direction:column;
    min-height:calc(100vh - 46px)}
  #log{flex:1}
  .msg{margin:14px 0}
  .msg .who{font-family:var(--mono);font-size:11px;color:var(--dim);text-transform:uppercase}
  .msg.user .body{color:var(--fg)}
  .msg.bot .body{background:var(--card);border:1px solid var(--line);border-radius:10px;
    padding:12px 14px;white-space:pre-wrap}
  .badge{font-family:var(--mono);font-size:11px;color:var(--warn);margin-left:8px}
  .cites{margin-top:8px;display:flex;flex-wrap:wrap;gap:6px}
  .cite{font-family:var(--mono);font-size:11px;color:var(--accent);
    border:1px solid var(--line);border-radius:6px;padding:2px 8px;cursor:pointer}
  .cite:hover{border-color:var(--accent)}
  .cite.cite-hot{outline:2px solid var(--accent);outline-offset:2px}
  mark.vb{background:rgba(227,179,65,.22);color:inherit;border-radius:2px;padding:0 1px;cursor:pointer}
  .hl-legend{font-size:11px;color:var(--dim);margin-top:6px}
  .evid{background:var(--card);border:1px solid var(--line);border-radius:8px;
    padding:10px 12px;margin-top:8px;white-space:pre-wrap;font-size:12.5px;
    color:var(--dim);font-family:var(--mono);overflow-x:auto}
  form{display:flex;gap:8px;position:sticky;bottom:0;background:var(--bg);
    padding:12px 0;border-top:1px solid var(--line)}
  textarea{flex:1;background:var(--card);color:var(--fg);border:1px solid var(--line);
    border-radius:8px;padding:10px;font:inherit;resize:vertical;min-height:44px}
  button{background:var(--accent);color:#fff;border:0;border-radius:8px;padding:0 18px;
    font:inherit;cursor:pointer}
  button:disabled{opacity:.5;cursor:not-allowed}
  .copybtn{background:transparent;color:var(--dim);border:1px solid var(--line);
    border-radius:6px;padding:1px 8px;font-size:11px;cursor:pointer;margin-left:8px}
  .copybtn:hover{border-color:var(--accent);color:var(--accent)}
  .hint{color:var(--dim);font-size:13px;margin:6px 0 0}
#ftdrawer{position:fixed;top:0;right:0;width:min(80vw,340px);height:100vh;overflow:auto;
  background:#0f0f12;border-left:1px solid rgba(255,255,255,.12);padding:12px;z-index:30;
  font:13px/1.7 ui-monospace,monospace}
#ftdrawer[hidden]{display:none}
.ftf{cursor:pointer;border-radius:4px}
.ftf:hover,.ftf:focus{background:rgba(255,255,255,.06);outline:none}
.ftf.del{opacity:.5;text-decoration:line-through}
.stb{font-size:11px;opacity:.7;margin-left:6px}
.st-M{color:#e3b341}.st-A{color:#3fb950}.st-D{color:#f85149}
.st-R{color:#a371f7}.st-C{color:#a371f7}.st-U{color:#f85149}
</style></head><body>
<header><span><b>CodeTalk</b> // <span data-i18n="tagline">接地对话 · 数据不出本机</span></span>
  <span><a href="/console" data-i18n="nav_console">控制台</a> &nbsp; <a href="/tunnel" data-i18n="nav_tunnel">时光轴</a> &nbsp; <a href="/graph" data-i18n="nav_graph">决策图</a> &nbsp; <a href="/course" data-i18n="nav_course">演进课程</a>
  &nbsp; <button id="langbtn" type="button" class="copybtn" aria-label="switch language">EN</button></span></header>
<main>
  <button id="filesbtn" type="button" data-i18n="files_btn">文件 ▸</button>
  <aside id="ftdrawer" hidden></aside>
  <p class="hint" data-i18n="hint">问「这段代码当初为什么这么写」——答案接地到真实 commit / 决策 / 会话原话;
    无 key 或 --no-llm 时降级为零-LLM 接地罗列(不出网)。</p>
  <div id="log" aria-live="polite" aria-relevant="additions text"></div>
  <div id="shint" class="hint"></div>
  <form id="f">
    <textarea id="q" data-i18n-ph="q_ph" placeholder="例:为什么把重试从装饰器改成显式循环?(可带 文件:行)"></textarea>
    <button id="send" type="submit" data-i18n="send">问</button>
  </form>
</main>
<script>
// ---- i18n:zh/en 字典 + 切换(零外联,复用 localStorage;数据仍不出本机)----
var I18N = {
  zh: {
    title: "CodeTalk · 接地对话", tagline: "接地对话 · 数据不出本机",
    nav_console: "控制台", nav_tunnel: "时光轴", nav_graph: "决策图", nav_course: "演进课程",
    files_btn: "文件 ▸", send: "问", you: "你", searching: "…接地检索中",
    hint: "问「这段代码当初为什么这么写」——答案接地到真实 commit / 决策 / 会话原话;无 key 或 --no-llm 时降级为零-LLM 接地罗列(不出网)。",
    q_ph: "例:为什么把重试从装饰器改成显式循环?(可带 文件:行)",
    ft_empty: "无文件或非 git 仓。", ft_head: "点变更文件 → 接地追问",
    ft_prefix: "这个文件当初为什么改:", suggest_prefix: "💡 Tab 填入:",
    degraded: "零-LLM 接地(未调模型)", copy: "复制", copied: "已复制", copy_fail: "复制失败",
    hl_legend: "高亮=逐字源自来源;其余为综合,点引用核验",
    loading_commit: "读取 commit…", commit_fail: "打不开该 commit(可能不在本地仓)",
    discuss: "讨论·", no_evidence: "(无证据)",
    diff_title: "看这枚 commit 的真实改动(git show,零 LLM)",
    err: "出错了(后端没起来?查 codetalk web 终端)",
    suggest: ["为什么这段代码当初要这么写?", "这里的关键决策是什么,依据什么?",
      "为什么从 X 改成 Y?", "这段有哪些待验证的风险?",
      "codetalk/llm.py:43-56 当初为什么这么设计?"]
  },
  en: {
    title: "CodeTalk · Grounded chat", tagline: "Grounded chat · data stays local",
    nav_console: "Console", nav_tunnel: "Timeline", nav_graph: "Graph", nav_course: "Course",
    files_btn: "Files ▸", send: "Ask", you: "You", searching: "…grounding retrieval",
    hint: "Ask \"why was this code written this way\" — answers are grounded in real commits / decisions / session transcripts; without a key or with --no-llm it degrades to a zero-LLM evidence list (no egress).",
    q_ph: "e.g. why was retry moved from a decorator to an explicit loop? (optional file:line)",
    ft_empty: "No files, or not a git repo.", ft_head: "Click a changed file → grounded follow-up",
    ft_prefix: "Why was this file changed: ", suggest_prefix: "💡 Tab to fill: ",
    degraded: "Zero-LLM grounding (no model call)", copy: "Copy", copied: "Copied", copy_fail: "Copy failed",
    hl_legend: "Highlight = verbatim from source; the rest is synthesized — click a citation to verify",
    loading_commit: "Loading commit…", commit_fail: "Can't open that commit (maybe not in the local repo)",
    discuss: "chat·", no_evidence: "(no evidence)",
    diff_title: "See this commit's real change (git show, zero-LLM)",
    err: "Error (backend down? check the codetalk web terminal)",
    suggest: ["Why was this code written this way?", "What's the key decision here, and on what basis?",
      "Why change from X to Y?", "What risks here are still unverified?",
      "Why was codetalk/llm.py:43-56 designed this way?"]
  }
};
var LANG = (function(){ try { var s = localStorage.getItem("codetalk.lang");
  if (s === "zh" || s === "en") return s;
  return (navigator.language || "").slice(0,2).toLowerCase() === "zh" ? "zh" : "en";
} catch(e){ return "zh"; } })();
function t(k){ return (I18N[LANG] && I18N[LANG][k] != null) ? I18N[LANG][k] : I18N.zh[k]; }
function applyLang(){
  document.documentElement.lang = LANG;
  document.title = t("title");
  document.querySelectorAll("[data-i18n]").forEach(function(el){ el.textContent = t(el.getAttribute("data-i18n")); });
  document.querySelectorAll("[data-i18n-ph]").forEach(function(el){ el.placeholder = t(el.getAttribute("data-i18n-ph")); });
  var lb = document.getElementById("langbtn"); if (lb) lb.textContent = LANG === "zh" ? "EN" : "中文";
  if (window.onLangChange) window.onLangChange();     // 让动态内容(建议/文件树)重渲染
}
function toggleLang(){ LANG = LANG === "zh" ? "en" : "zh";
  try { localStorage.setItem("codetalk.lang", LANG); } catch(e){}
  applyLang(); }

var convId = "web-" + Date.now();
var turn = 0;
var TREE = $tree_data;
var pendingTarget = null;
var log = document.getElementById("log");
// 自动滚到最新:仅在用户已在底部时(上滚阅读历史时不打断)
function atBottom(){ return (window.innerHeight + window.scrollY)
  >= document.documentElement.scrollHeight - 80; }
function scrollEnd(){ window.scrollTo(0, document.documentElement.scrollHeight); }

function renderFiletree(){
  var T = TREE && TREE.nodes;
  var dr = document.getElementById("ftdrawer");
  if (!T || !T.children || !T.children.length){
    dr.innerHTML = '<p class="hint">'+esc(t("ft_empty"))+'</p>'; return; }
  function mark(code){ return code ? code.replace(/ /g,"").charAt(0) : ""; }
  function nodeHtml(node, depth){
    var pad = ' style="padding-left:'+(depth*14)+'px"';
    if (node.type === "file"){
      var m = mark(node.code);
      var cls = "ftf" + (m ? " st-"+esc(m) : "")
        + (node.code && node.code.indexOf("D")>=0 ? " del" : "");
      var badge = node.label ? ' <span class="stb">'+esc(node.label)+'</span>' : "";
      return '<div class="'+cls+'" data-path="'+esc(node.path)+'" role="button"'
        + ' tabindex="0"'+(node.label?' title="'+esc(node.label)+'"':"")+pad+'>'
        + esc(node.name)+badge+'</div>';
    }
    var kids = node.children.map(function(c){ return nodeHtml(c, depth+1); }).join("");
    return '<details'+(node.changed?" open":"")+'><summary'+pad+'>'+esc(node.name)
      + '</summary>'+kids+'</details>';
  }
  dr.innerHTML = '<div class="hint">'+esc(t("ft_head"))+'</div>'
    + T.children.map(function(c){ return nodeHtml(c, 0); }).join("");
  dr.querySelectorAll(".ftf").forEach(function(el){
    function act(){
      var p = el.getAttribute("data-path");
      document.getElementById("q").value = t("ft_prefix") + p;
      pendingTarget = p;
      document.getElementById("q").focus();
      dr.hidden = true;
    }
    el.addEventListener("click", act);
    el.addEventListener("keydown", function(e){
      if (e.key==="Enter" || e.key===" "){ e.preventDefault(); act(); } });
  });
}
document.getElementById("filesbtn").addEventListener("click", function(){
  var dr = document.getElementById("ftdrawer"); dr.hidden = !dr.hidden; });
document.addEventListener("keydown", function(e){      // Esc 关文件抽屉
  if (e.key === "Escape"){ var dr = document.getElementById("ftdrawer");
    if (dr && !dr.hidden) dr.hidden = true; } });
renderFiletree();

// 输入框为空时按 Tab → 填入当前建议问题并切下一条(无外联,纯本地;建议随语言切换)
var sIdx = 0, qEl = document.getElementById("q"), sHint = document.getElementById("shint");
function showSuggest(){ var sg = t("suggest"); sHint.textContent = t("suggest_prefix") + sg[sIdx % sg.length]; }
showSuggest();
qEl.addEventListener("keydown", function(e){
  // Enter 发送、Shift+Enter 换行;IME 合成中(中文选词)不发,避免误触
  if (e.key === "Enter" && !e.shiftKey && !e.isComposing && e.keyCode !== 229){
    e.preventDefault();
    var fm = document.getElementById("f");
    if (fm.requestSubmit){ fm.requestSubmit(); }
    else { fm.dispatchEvent(new Event("submit", { cancelable: true })); }
    return;
  }
  if (e.key === "Tab" && !qEl.value.trim()){
    e.preventDefault();
    var sg = t("suggest");
    qEl.value = sg[sIdx % sg.length];
    sIdx = (sIdx + 1) % sg.length;
    showSuggest();
  }
});

function esc(s){ return String(s == null ? "" : s)
  .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

function add(who, cls){
  var d = document.createElement("div");
  d.className = "msg " + cls;
  d.innerHTML = '<div class="who">' + who + '</div><div class="body"></div>';
  log.appendChild(d);
  return d.querySelector(".body");
}

function renderDone(body, ev, acc){
  if (ev.degraded){
    var b = document.createElement("span");
    b.className = "badge"; b.textContent = t("degraded");
    body.parentNode.querySelector(".who").appendChild(b);
  }
  var cp = document.createElement("button");            // 复制答案(127.0.0.1 = clipboard 安全上下文)
  cp.type = "button"; cp.className = "copybtn"; cp.textContent = t("copy");
  cp.addEventListener("click", function(){
    function ok(){ cp.textContent = t("copied");
      setTimeout(function(){ cp.textContent = t("copy"); }, 1200); }
    if (navigator.clipboard && navigator.clipboard.writeText){
      navigator.clipboard.writeText(acc).then(ok, function(){ cp.textContent = t("copy_fail"); });
    } else { cp.textContent = t("copy_fail"); }
  });
  body.parentNode.querySelector(".who").appendChild(cp);
  function setBody(html){ body.innerHTML = html; }      // 全文件唯一 innerHTML sink
  var H = ev.highlights || [];
  if (H.length){
    if (H.map(function(s){ return s.text; }).join("") !== acc){
      setBody(esc(acc));                                 // 段拼接≠累积答案 → 回退,仍转义
    } else {
      setBody(H.map(function(s){
        return s.cite_id == null ? esc(s.text)
          : '<mark class="vb" data-cite="' + String(s.cite_id) + '">' + esc(s.text) + '</mark>';
      }).join(""));
      var lg = document.createElement("div"); lg.className = "hl-legend";
      lg.textContent = t("hl_legend");
      body.parentNode.appendChild(lg);
    }
  }
  var cites = ev.citations || [];
  if (!cites.length) return;
  function openCommit(sha, panel){                       // 点 SHA → 拉真实 commit 到就地面板
    panel.textContent = t("loading_commit"); panel.style.display = "block";
    panel.dataset.cur = "commit:" + sha;
    fetch("/api/commit/" + encodeURIComponent(sha))
      .then(function(r){ return r.ok ? r.json() : Promise.reject(); })
      .then(function(d){
        panel.textContent = (d.date ? d.date + "  " : "") + (d.subject || "")
          + (d.body ? "\n\n" + d.body : "") + (d.diff ? "\n\n" + d.diff : "");
      })
      .catch(function(){ panel.textContent = t("commit_fail"); });
  }
  var box = document.createElement("div"); box.className = "cites";
  var panel = document.createElement("pre"); panel.className = "evid";
  panel.style.display = "none";
  cites.forEach(function(c){
    var s = document.createElement("span"); s.className = "cite";
    s.textContent = (c.kind === "conversation" ? t("discuss") : "") + (c.sha || c.id) + " ▸";
    s.title = (c.evidence || "").slice(0, 280);          // hover 预览真实原话(GitLens 范式)
    s.dataset.cite = String(c.id);                       // <mark> 点击联动锚点
    s.addEventListener("click", function(){              // 点开就地核验真实记录,再点收起
      var cur = String(c.id);
      if (panel.dataset.cur === cur && panel.style.display !== "none"){
        panel.style.display = "none"; panel.dataset.cur = "";
      } else {
        panel.textContent = c.evidence || t("no_evidence");
        panel.style.display = "block"; panel.dataset.cur = cur;
      }
    });
    box.appendChild(s);
    if (c.sha && c.kind !== "conversation"){             // commit 引用:点开真实 git show 核验
      var d = document.createElement("span"); d.className = "cite";
      d.textContent = "diff ▾"; d.title = t("diff_title");
      d.setAttribute("role", "button"); d.tabIndex = 0;
      var open = function(){ openCommit(c.sha, panel); };
      d.addEventListener("click", open);
      d.addEventListener("keydown", function(e){
        if (e.key === "Enter" || e.key === " "){ e.preventDefault(); open(); } });
      box.appendChild(d);
    }
    (c.sources || []).forEach(function(src){             // PR 可点击跳真实源(新标签页)
      if (src.type === "pr" && src.url){
        var a = document.createElement("a"); a.className = "cite";
        a.href = src.url; a.target = "_blank"; a.rel = "noopener";
        a.textContent = "#" + src.number + " ↗"; box.appendChild(a);
      }
    });
  });
  body.parentNode.appendChild(box);
  body.parentNode.appendChild(panel);
  body.querySelectorAll("mark.vb").forEach(function(m){  // <mark> 点击 → 滚到并高亮对应 chip
    m.addEventListener("click", function(){
      var el = document.querySelector('.cite[data-cite="' + CSS.escape(m.getAttribute("data-cite")) + '"]');
      if (el){ el.scrollIntoView({ block: "center" });
        el.classList.add("cite-hot");
        setTimeout(function(){ el.classList.remove("cite-hot"); }, 1200); }
    });
  });
}

document.getElementById("f").addEventListener("submit", function(e){
  e.preventDefault();
  var q = document.getElementById("q").value.trim();
  if (!q) return;
  add(t("you"), "user").textContent = q;
  document.getElementById("q").value = "";
  var btn = document.getElementById("send"); btn.disabled = true;
  var body = add("codetalk", "bot"); body.textContent = t("searching"); scrollEnd();
  var acc = "";                                          // 累积完整答案,供 done 切段重渲染
  fetch("/api/chat/stream", { method:"POST", headers:{"Content-Type":"application/json"},
    body: JSON.stringify({ question:q, conv_id:convId, turn_seq:turn++, target: pendingTarget }) })
    .then(function(resp){
      var reader = resp.body.getReader(), dec = new TextDecoder(), buf = "", started = false;
      function pump(){
        return reader.read().then(function(res){
          if (res.done){ btn.disabled = false; return; }
          buf += dec.decode(res.value, { stream:true });
          var parts = buf.split("\n\n"); buf = parts.pop();
          parts.forEach(function(p){
            var line = p.trim();
            if (line.indexOf("data:") !== 0) return;
            var ev; try { ev = JSON.parse(line.slice(5).trim()); } catch(e){ return; }
            if (ev.type === "token"){
              var wasBottom = atBottom();                    // 流式期间贴底,除非用户上滚
              if (!started){ body.textContent = ""; started = true; }
              body.textContent += ev.text; acc += ev.text;   // 逐块蹦字(流式)+ 累积
              if (wasBottom) scrollEnd();
            } else if (ev.type === "done"){ renderDone(body, ev, acc); }
          });
          return pump();
        });
      }
      return pump();
    })
    .catch(function(){ body.textContent = t("err");
      btn.disabled = false; });
  pendingTarget = null;
});

// 语言切换:静态元素由 applyLang 换,动态内容(建议行 + 文件树)经 onLangChange 重渲染
window.onLangChange = function(){ showSuggest(); renderFiletree(); };
var _lb = document.getElementById("langbtn");
if (_lb) _lb.addEventListener("click", toggleLang);
applyLang();
</script>
</body></html>
