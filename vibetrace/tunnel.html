<!DOCTYPE html>
<html lang="zh"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>$project — 时光轴</title>
<style>
  :root {
    --bg: #0d0d0f; --fg: #e8e8ea; --dim: #8b8b92; --faint: #5a5a62;
    --line: #26262b; --card: #16161a; --card2: #1c1c22;
    --accent: #5b9cff; --warn: #e0a44a; --ok: #57b87a;
    --sans: -apple-system, "Segoe UI", "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
    --mono: "SF Mono", ui-monospace, "Cascadia Code", Menlo, monospace;
    --ink: #cfe0ff;                       /* 选中/hover 文字(深色:浅墨蓝),与 console 一致 */
    --serif: "Iowan Old Style", "Palatino Linotype", Palatino, "Book Antiqua", Georgia,
      "PingFang SC", "Microsoft YaHei", serif;   /* 英文复古衬线 + 中文 PingFang(无 CDN)*/
  }
  * { box-sizing: border-box; }
  /* 键盘焦点可见:给可点击非按钮件(role=button / 改答链接)统一焦点环 */
  [role="button"]:focus-visible, .reanswer:focus-visible {
    outline: 2px solid var(--accent); outline-offset: 2px; }
  html { scroll-behavior: smooth; }
  body { margin: 0; background: var(--bg); color: var(--fg);
    font-family: var(--serif); line-height: 1.65;
    -webkit-font-smoothing: antialiased; }
  ::selection { background: var(--accent); color: #fff; }
  a { color: var(--accent); }
  header { position: sticky; top: 0; z-index: 5;
    display: flex; justify-content: space-between; align-items: center;
    gap: 12px; padding: 13px 24px; background: rgba(13,13,15,.9);
    backdrop-filter: blur(10px); border-bottom: 1px solid var(--line);
    font-family: var(--mono); font-size: 12px; color: var(--dim);
    letter-spacing: .03em; }
  header .b { color: var(--fg); font-weight: 600; letter-spacing: .12em; }
  main { max-width: 780px; margin: 0 auto; padding: 38px 24px 140px; }
  .intro { color: var(--dim); font-size: 13px; line-height: 1.7;
    margin: 0 0 30px; }
  .intro b { color: var(--fg); font-weight: 500; }

  /* 待验证胶囊 callout */
  .due { border: 1px solid var(--accent); background: rgba(91,156,255,.07);
    padding: 16px 18px; margin: 0 0 34px; }
  .due h4 { margin: 0 0 4px; font-size: 12px; font-family: var(--mono);
    letter-spacing: .06em; text-transform: uppercase; color: var(--accent); }
  .due .q { font-size: 14px; margin: 10px 0; }
  .due .q .ago { color: var(--dim); }
  .btns { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 6px; }
  .btn { font: inherit; font-size: 13px; color: var(--fg);
    background: var(--card2); border: 1px solid var(--line);
    padding: 6px 14px; cursor: pointer; }
  .btn:hover:not(:disabled) { border-color: var(--accent); color: var(--ink); }
  .btn:disabled { opacity: .4; cursor: not-allowed; }
  .ro { font-size: 12px; color: var(--faint); margin-top: 8px;
    font-family: var(--mono); }
  .reanswer { font-size: 12px; color: var(--accent); cursor: pointer;
    font-family: var(--mono); margin-left: 4px; }
  .reanswer:hover { text-decoration: underline; }

  /* 时间轴 */
  .daygroup { margin-top: 8px; }
  .day { font-family: var(--mono); font-size: 11px; color: var(--faint);
    letter-spacing: .1em; text-transform: uppercase;
    margin: 30px 0 6px; padding-left: 26px; }
  .row { position: relative; padding-left: 26px;
    border-left: 1px solid var(--line); margin-left: 5px; }
  .row::before { content: ""; position: absolute; left: -5px; top: 16px;
    width: 9px; height: 9px; background: var(--bg);
    border: 1px solid var(--faint); }
  .row.read::before { background: var(--dim); border-color: var(--dim); }
  .row.risky::before { border-color: var(--warn); }
  .head { cursor: pointer; padding: 9px 0;
    transform-origin: center center; border-radius: 12px;
    transition: transform .5s ease-out, background .3s ease, box-shadow .3s ease; }
  .head .top { display: flex; gap: 10px; align-items: baseline; }
  .sha { font-family: var(--mono); font-size: 12px; color: var(--faint); }
  .subj { font-size: 15px; flex: 1; min-width: 0; }
  .head:hover .subj { color: var(--ink); }
  /* 悬停:这一条像气球一样慢慢鼓起来 —— 向中心平滑放大 1.25x(无震动),浮于时间轴之上。 */
  .row:hover { z-index: 30; }
  .head:hover { transform: scale(1.25); background: var(--card2);
    box-shadow: 0 10px 28px rgba(0,0,0,.45), 0 0 0 1px var(--line),
      0 0 18px rgba(91,156,255,.15); }
  @media (prefers-reduced-motion: reduce) {
    .head:hover { transform: none; }   /* 偏好减少动效:只高亮,不放大 */
  }
  .badges { font-family: var(--mono); font-size: 11px; color: var(--faint);
    white-space: nowrap; }
  .badges .d { color: var(--accent); }
  .badges .r { color: var(--warn); }
  .badges .c { color: var(--ok); }
  .prev { color: var(--dim); font-size: 13px; margin: 2px 0 0;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .row.open .prev { display: none; }

  .body { display: none; padding: 4px 0 18px; }
  .row.open .body { display: block; }
  .body .lbl { font-family: var(--mono); font-size: 11px; color: var(--dim);
    letter-spacing: .08em; text-transform: uppercase; margin: 16px 0 5px; }
  .body p { margin: 0; font-size: 14px; color: var(--fg); }
  .body ol { margin: 4px 0 0; padding-left: 22px; }
  .body li { font-size: 13.5px; line-height: 1.7; margin: 3px 0; }
  .body ol.risks li { color: var(--warn); }
  .body .cap { font-size: 13.5px; line-height: 1.7; margin: 4px 0;
    padding-left: 2px; }
  .body .cap .tag { font-family: var(--mono); font-size: 11px;
    padding: 1px 6px; border: 1px solid var(--line); margin-right: 8px; }
  .body .cap .tag.due { color: var(--accent); border-color: var(--accent); }
  .body .cap .tag.done { color: var(--ok); border-color: var(--ok); }
  .empty { color: var(--faint); font-size: 13px; font-style: italic; }
  footer { max-width: 780px; margin: 0 auto; padding: 0 24px 60px;
    color: var(--faint); font-size: 12px; font-family: var(--mono); }
</style></head><body>
<header>
  <span><span class="b">VIBETRACE</span> // 时光轴 · $project</span>
  <span>LOCAL-FIRST · $generated</span>
</header>
<main id="app"></main>
<footer id="foot"></footer>
<script>
var DATA = $data;          // _payload:最新在前
var SERVE = $serve;        // --serve:回答/回看写回 cache;file:// 只读
var VKEY = "vibetrace.visited.$project";

function esc(s){ return String(s == null ? "" : s)
  .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;"); }
function store(v){
  try {
    if (v === undefined) return JSON.parse(localStorage.getItem(VKEY)) || {};
    localStorage.setItem(VKEY, JSON.stringify(v));
  } catch (e) { return {}; }
}
function post(path, payload){
  if (!SERVE) return Promise.resolve(false);
  return fetch(path, { method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(payload) })
    .then(function(r){ return r.ok; })
    .catch(function(){ return false; });
}
// 键盘可达:Enter / Space 激活;Space 阻止默认滚屏。给可点击非按钮元素接键。
function onActivate(el, fn){
  el.addEventListener("click", fn);
  el.addEventListener("keydown", function(e){
    if (e.key === "Enter" || e.key === " "){ e.preventDefault(); fn(e); }
  });
}
var visited = store();

function agoText(n){
  return n === 0 ? "今天" : n + " 天前";
}
function capTag(cap){
  if (cap.outcome) return '<span class="tag done">✓ ' + esc(cap.outcome) + '</span>';
  if (cap.opened) return '<span class="tag due">待验证</span>';
  return '<span class="tag">未到期</span>';
}

// ---- 主体:按天分组的线性时间轴 ----
function renderTimeline(){
  var app = document.getElementById("app");
  if (!DATA.length){ app.innerHTML = '<p class="empty">还没有任何 commit。</p>'; return; }
  var narrated = DATA.filter(function(c){ return c.what; }).length;
  var openRisks = DATA.reduce(function(a, c){ return a + c.risks.length; }, 0);
  var html = '<p class="intro">从<b>最近</b>往下,是这个项目一步步长成现在的样子。'
    + '共 <b>' + DATA.length + '</b> 枚 commit · 已叙事 <b>' + narrated + '</b> · '
    + '待验证的担心 <b>' + openRisks + '</b> 处。点任意一条展开它当时的决策与推导。</p>';
  html += dueCapsulesHtml();
  var lastDay = null;
  DATA.forEach(function(c, i){
    if (c.day !== lastDay){
      lastDay = c.day;
      html += '<div class="day">' + c.day + ' · ' + agoText(c.days_ago) + '</div>';
    }
    html += rowHtml(c, i);
  });
  app.innerHTML = html;
  DATA.forEach(function(c, i){
    var head = document.getElementById("h" + i);
    onActivate(head, function(){ toggleRow(c, i); });
  });
  wireDueButtons();
  renderFooter();
}

function rowHtml(c, i){
  var cls = "row" + (visited[c.sha] ? " read" : "") + (c.risks.length ? " risky" : "");
  var badges = '<span class="d">' + c.decisions.length + ' 决策</span>'
    + (c.risks.length ? ' · <span class="r">' + c.risks.length + ' 待验证</span>' : "")
    + ((c.capsules || []).length ? ' · <span class="c">' + c.capsules.length + ' 胶囊</span>' : "");
  var prev = c.what || "尚未叙事 — 终端跑 vibetrace digest";
  return '<div class="' + cls + '" id="r' + i + '">'
    + '<div class="head" id="h' + i + '" role="button" tabindex="0"'
    + ' aria-expanded="false" aria-controls="b' + i + '"><div class="top">'
    + '<span class="sha">' + c.sha + '</span>'
    + '<span class="subj">' + esc(c.subject) + '</span>'
    + '<span class="badges">' + badges + '</span></div>'
    + '<div class="prev">' + esc(prev) + '</div></div>'
    + '<div class="body" id="b' + i + '"></div></div>';
}

function bodyHtml(c){
  var h = "";
  if (c.what) h += '<div class="lbl">改了什么 — What</div><p>' + esc(c.what) + '</p>';
  if (c.why) h += '<div class="lbl">为什么 — Why</div><p>' + esc(c.why) + '</p>';
  if (c.decisions.length){
    h += '<div class="lbl">关键决策 — Decisions</div><ol>';
    c.decisions.forEach(function(d){ h += '<li>' + esc(d) + '</li>'; });
    h += '</ol>';
  }
  if (c.risks.length){
    h += '<div class="lbl">待验证 — Open</div><ol class="risks">';
    c.risks.forEach(function(r){ h += '<li>' + esc(r) + '</li>'; });
    h += '</ol>';
  }
  if ((c.capsules || []).length){
    h += '<div class="lbl">时间胶囊 — Capsule</div>';
    c.capsules.forEach(function(cap){
      h += '<div class="cap">' + capTag(cap) + esc(cap.risk) + '</div>';
    });
  }
  if (!c.what && !c.why)
    h += '<p class="empty">这枚 commit 尚未被叙事。回终端跑 vibetrace digest。</p>';
  return h;
}

function toggleRow(c, i){
  var row = document.getElementById("r" + i);
  var open = row.classList.toggle("open");
  document.getElementById("h" + i).setAttribute("aria-expanded",
    open ? "true" : "false");
  if (!open) return;
  var body = document.getElementById("b" + i);
  if (!body.innerHTML) body.innerHTML = bodyHtml(c);
  if (!visited[c.sha]){                 // 首次展开:记回看(喂理解债)
    visited[c.sha] = 1; store(visited);
    row.classList.add("read");
    post("/reviewed", { sha: c.sha });
  }
}

// ---- 待验证胶囊:置顶 callout,serve 模式可现场回答写回 cache ----
function dueCaps(){
  var out = [];
  DATA.forEach(function(c){
    (c.capsules || []).forEach(function(cap){
      if (cap.opened && !cap.outcome) out.push({ cap: cap, host: c });
    });
  });
  return out;
}
function dueBtnsHtml(k){
  var h = '<div class="btns">';
  ["想多了", "已解决", "还在担心"].forEach(function(label){
    h += '<button class="btn" data-k="' + k + '" data-out="' + label + '"'
      + (SERVE ? "" : " disabled") + '>' + label + '</button>';
  });
  return h + '</div>';
}
function dueDoneHtml(out){
  return '<span class="ago">已记录:</span>'
    + '<span style="color:var(--ok)">' + esc(out) + '</span>'
    + ' <span class="reanswer" role="button" tabindex="0">改答 ↺</span>';
}
function dueCapsulesHtml(){
  var due = dueCaps();
  if (!due.length) return "";
  var h = '<div class="due"><h4>■ 到期待验证的预测 — ' + due.length + ' 枚</h4>';
  due.forEach(function(d, k){
    h += '<div class="q" data-k="' + k + '"><span class="ago">'
      + agoText(d.host.days_ago) + '你担心:</span>「' + esc(d.cap.risk) + '」'
      + '<div class="ans" id="due-ans-' + k + '">' + dueBtnsHtml(k) + '</div></div>';
  });
  if (!SERVE) h += '<div class="ro">只读 · 跑 vibetrace tunnel --serve 可回写答案</div>';
  h += '</div>';
  return h;
}
// 答案区在「选项组」与「已记录 + 改答↺」两态间切换;改答只是再 post 一次新 outcome
// (set_capsule_outcome 是 UPDATE,后端天然支持改写)。
function wireDueAns(k, due){
  var ans = document.getElementById("due-ans-" + k);
  if (!ans) return;
  ans.querySelectorAll(".btn").forEach(function(b){
    if (!SERVE) return;
    b.addEventListener("click", function(){
      answerDue(k, due, b.getAttribute("data-out"));
    });
  });
  var re = ans.querySelector(".reanswer");
  if (re) onActivate(re, function(){
    ans.innerHTML = dueBtnsHtml(k); wireDueAns(k, due); });
}
function answerDue(k, due, out){
  // res.ok 确认写回后才落地「已记录」,失败保留选项 + 提示重试,杜绝 UI 假成功。
  var ans = document.getElementById("due-ans-" + k), d = due[k];
  post("/capsule", { capsule_id: d.cap.id, outcome: out }).then(function(ok){
    if (ok){ d.cap.outcome = out; ans.innerHTML = dueDoneHtml(out); wireDueAns(k, due); }
    else ans.insertAdjacentHTML("beforeend",
      '<div class="ro" style="color:var(--warn)">写回失败,请重试</div>');
  });
}
function wireDueButtons(){
  if (!SERVE) return;
  var due = dueCaps();
  due.forEach(function(d, k){ wireDueAns(k, due); });
}

function renderFooter(){
  var read = DATA.filter(function(c){ return visited[c.sha]; }).length;
  document.getElementById("foot").textContent =
    "已读 " + read + "/" + DATA.length + " 段叙事"
    + (SERVE ? " · serve 模式:回答即时写回 cache.db" : " · 只读模式");
}

renderTimeline();
document.addEventListener("keydown", function(e){     // j/k 在 commit 行头间移焦点
  if (e.metaKey || e.ctrlKey || e.altKey) return;
  var tag = e.target && e.target.tagName;
  if (tag === "INPUT" || tag === "TEXTAREA") return;
  if (e.key !== "j" && e.key !== "k") return;
  var heads = [].slice.call(document.querySelectorAll(".head"));
  if (!heads.length) return;
  var cur = heads.indexOf(document.activeElement);
  var nx = cur < 0 ? 0 : (e.key === "j" ? cur + 1 : cur - 1);
  nx = Math.max(0, Math.min(heads.length - 1, nx));
  e.preventDefault(); heads[nx].focus();
});
</script>
</body></html>
