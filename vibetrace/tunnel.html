<!DOCTYPE html>
<html lang="zh"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>$project — 时光隧道</title>
<link rel="stylesheet"
  href="https://cdn.jsdelivr.net/fontsource/css/fusion-pixel-12px-monospaced-sc@latest/index.css">
<style>
  :root { --fg: #fff; --g1: #e9e9e9; --g2: #7a7a7a; --g3: #3e3e3e;
          --g4: #292929; --blue: #1783ff;
          --px: "Fusion Pixel 12px Monospaced SC", "SF Mono", ui-monospace,
                Menlo, monospace; }
  * { box-sizing: border-box; border-radius: 0 !important; }
  ::selection { background: #fff; color: #000; }
  html, body { height: 100%; margin: 0; overflow: hidden; background: #000;
    color: var(--fg); font-family: var(--px); }
  canvas { position: fixed; inset: 0; width: 100vw; height: 100vh;
    image-rendering: pixelated; }
  #stars { z-index: 0; }
  #swarm { z-index: 6; pointer-events: none; }
  .vignette { position: fixed; inset: 0; pointer-events: none; z-index: 3;
    background: radial-gradient(ellipse at center, transparent 0 58%,
      rgba(0,0,0,.3) 58% 78%, rgba(0,0,0,.55) 78% 92%, rgba(0,0,0,.8) 92%); }
  #viewport { position: fixed; inset: 0; z-index: 2; perspective: 950px;
    perspective-origin: 50% 50%; cursor: crosshair; }
  body.dragging #viewport { cursor: grabbing; }
  #world { position: absolute; left: 50%; top: 50%;
    transform-style: preserve-3d; will-change: transform; }
  .card { --c-bg: #000; --c-fg: var(--g1); --c-mut: var(--g2);
    position: absolute; left: 0; top: 0; width: 256px;
    background: var(--c-bg); border: 1px solid #fff;
    box-shadow: 5px 5px 0 var(--g4); padding: 12px 14px 10px;
    cursor: pointer; }
  .card:hover { --c-bg: #fff; --c-fg: #000; --c-mut: #3e3e3e;
    box-shadow: 5px 5px 0 var(--g2); }
  .card .m { font-size: 10px; letter-spacing: .08em;
    text-transform: uppercase; color: var(--c-mut); }
  .card h3 { font-size: 13px; font-weight: 400; color: var(--c-fg);
    margin: 8px 0 6px; line-height: 1.4; }
  .card p { font-size: 11px; line-height: 1.6; color: var(--c-mut); margin: 0;
    display: -webkit-box; -webkit-line-clamp: 3;
    -webkit-box-orient: vertical; overflow: hidden; }
  .card .ft { display: flex; justify-content: space-between; margin-top: 10px;
    padding-top: 7px; border-top: 1px solid var(--c-mut); font-size: 10px;
    letter-spacing: .06em; text-transform: uppercase; color: var(--c-mut); }
  .card .ft .risk { color: var(--blue); }
  .card:hover .ft .risk { color: #0057c2; }
  .marker { position: absolute; left: 0; top: 0; white-space: nowrap;
    font-size: 13px; letter-spacing: .14em; text-transform: uppercase;
    color: var(--g1); }
  .marker::before { content: "▙ "; color: var(--g2); }
  .genesis { position: absolute; left: 0; top: 0; text-align: center;
    font-size: 26px; letter-spacing: .28em; color: #fff;
    white-space: nowrap; }
  .genesis::after { content: "▮"; animation: blink 1.1s steps(1) infinite; }
  .genesis span { display: block; margin-top: 12px; font-size: 11px;
    letter-spacing: .12em; color: var(--g2); }
  @keyframes blink { 0%, 49% { opacity: 1; } 50%, 100% { opacity: 0; } }
  .endpix { position: absolute; left: 0; top: 0; width: 480px; height: 480px;
    margin: -240px 0 0 -240px; pointer-events: none; opacity: .14;
    background: repeating-conic-gradient(#fff 0 25%, transparent 0 50%)
      0 0 / 10px 10px;
    -webkit-mask-image: radial-gradient(closest-side, #000, transparent 72%);
    mask-image: radial-gradient(closest-side, #000, transparent 72%); }
  .hud { position: fixed; z-index: 5; pointer-events: none; font-size: 12px;
    letter-spacing: .1em; text-transform: uppercase; color: var(--g2); }
  .hud.top { top: 0; left: 0; right: 0; display: flex;
    justify-content: space-between; padding: 12px 18px;
    border-bottom: 1px solid var(--g4); background: #000; }
  .hud.top .t { color: var(--g1); }
  .hud.depth { right: 18px; bottom: 16px; text-align: right; line-height: 1.8;
    color: var(--g1); }
  .hud.depth::after { content: " ▮"; animation: blink 1.1s steps(1) infinite; }
  .hud.hint { left: 18px; bottom: 16px; }
  .hud.hint b { color: var(--g1); font-weight: 400; }
  #focus { position: fixed; top: 0; right: 0; bottom: 0; width: 432px;
    max-width: 94vw; z-index: 8; background: #000;
    border-left: 1px solid #fff; padding: 34px 30px; overflow-y: auto;
    transform: translateX(103%);
    transition: transform .3s steps(7); }
  #focus.open { transform: translateX(0); }
  #focus .m { font-size: 10.5px; letter-spacing: .08em;
    text-transform: uppercase; color: var(--g2); }
  #focus h2 { font-size: 19px; font-weight: 400; line-height: 1.45;
    margin: 14px 0 4px; color: #fff; }
  #focus .lbl { font-size: 11px; letter-spacing: .12em;
    text-transform: uppercase; color: var(--g2); margin: 30px 0 0;
    padding-bottom: 8px; border-bottom: 1px solid var(--g4); }
  #focus .lbl::before { content: "■ "; color: var(--g3); }
  #focus p { font-size: 13px; line-height: 1.85; color: var(--g1);
    margin: 12px 0 0; }
  #focus p.dim { color: var(--g2); }
  #focus ol { list-style: none; margin: 0; padding: 0; counter-reset: n; }
  #focus ol li { counter-increment: n; display: flex; gap: 16px;
    padding: 12px 0; border-bottom: 1px solid var(--g4); font-size: 12.5px;
    line-height: 1.7; color: var(--g1); }
  #focus ol li::before { content: "[" counter(n, decimal-leading-zero) "]";
    font-size: 10.5px; color: var(--g2); padding-top: 3px; }
  #focus ol.open li::before { color: var(--blue); }
  #focus .close-hint { margin-top: 34px; }
</style></head><body>
<canvas id="stars"></canvas>
<div id="viewport"><div id="world"></div></div>
<div class="vignette"></div>
<canvas id="swarm"></canvas>
<div class="hud top">
  <span><span class="t">VIBETRACE</span>//时光隧道 · $project</span>
  <span>LOCAL-FIRST · $generated</span>
</div>
<div class="hud depth" id="depth"></div>
<div class="hud hint"><b>[SCROLL]</b>穿行 <b>[SPACE]</b>漫游
  <b>[CLICK]</b>读取 <b>[ESC]</b>返回</div>
<div id="focus"></div>
<script>
var DATA = $data;
var SPACING = 430, RADIUS = 240, CK = 0.0011, CA = 170, PIX = 3;
function bendX(z){ return Math.sin(z * CK) * CA; }
function bendY(z){ return Math.cos(z * 0.00073) * 64; }
function el(cls, html){ var d = document.createElement('div');
  d.className = cls; d.innerHTML = html; return d; }
function esc(s){ return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;'); }
function quant(v, steps){ return Math.ceil(v * steps) / steps; }

var world = document.getElementById('world');
var items = [];
DATA.forEach(function(c, i){
  var z = -(i + 1) * SPACING;
  var ang = i * 2.39996323;
  var x = Math.cos(ang) * RADIUS + bendX(z);
  var y = Math.sin(ang) * RADIUS * 0.72 + bendY(z);
  var body = '<div class="m">' + c.sha + ' · ' + c.day + '</div>'
    + '<h3>' + esc(c.subject) + '</h3>'
    + '<p>' + esc(c.what || '尚未叙事 — 终端执行 vibetrace digest') + '</p>'
    + '<div class="ft"><span>' + c.decisions.length + ' decisions</span>'
    + (c.risks.length ? '<span class="risk">' + c.risks.length + ' open</span>'
                      : '<span>settled</span>') + '</div>';
  var d = el('card', body);
  d.style.transform = 'translate(-50%,-50%) translate3d(' + x.toFixed(1)
    + 'px,' + y.toFixed(1) + 'px,' + z + 'px)';
  d.addEventListener('click', function(ev){ ev.stopPropagation(); openFocus(c); });
  world.appendChild(d);
  items.push({ el: d, z: z });
});

var seenDay = {};
DATA.forEach(function(c, i){
  if (seenDay[c.day]) return;
  seenDay[c.day] = 1;
  var z = -(i + 1) * SPACING + 185;
  var label = c.day + (c.days_ago === 0 ? ' — today'
    : ' — ' + c.days_ago + (c.days_ago === 1 ? ' day ago' : ' days ago'));
  var d = el('marker', label);
  d.style.transform = 'translate(-50%,-50%) translate3d(' + bendX(z).toFixed(1)
    + 'px, 300px,' + z + 'px)';
  world.appendChild(d);
  items.push({ el: d, z: z });
});

var ENDZ = -(DATA.length + 1.7) * SPACING;
var pix = el('endpix', '');
pix.style.transform = 'translate3d(' + bendX(ENDZ - 220).toFixed(1) + 'px,'
  + bendY(ENDZ - 220).toFixed(1) + 'px,' + (ENDZ - 220) + 'px)';
world.appendChild(pix);
items.push({ el: pix, z: ENDZ - 220 });
var genesis = el('genesis', 'GENESIS<span>'
  + DATA[DATA.length - 1].day + ' — 起点,一切由此开始</span>');
genesis.style.transform = 'translate(-50%,-50%) translate3d('
  + bendX(ENDZ).toFixed(1) + 'px,' + bendY(ENDZ).toFixed(1) + 'px,' + ENDZ + 'px)';
world.appendChild(genesis);
items.push({ el: genesis, z: ENDZ });

var cam = 0, target = 0, vel = 0, auto = false;
var MAX = (DATA.length + 1.4) * SPACING;
var lookX = 0, lookY = 0, mX = 0, mY = 0;
var mouseX = innerWidth / 2, mouseY = innerHeight / 2;
function clampT(){ target = Math.max(0, Math.min(MAX, target)); }
addEventListener('wheel', function(e){ target += e.deltaY * 1.5; clampT(); },
  { passive: true });
var drag = false, lastY = 0;
addEventListener('pointerdown', function(e){ drag = true; lastY = e.clientY;
  document.body.classList.add('dragging'); });
addEventListener('pointermove', function(e){
  mX = e.clientX / innerWidth - 0.5;
  mY = e.clientY / innerHeight - 0.5;
  mouseX = e.clientX; mouseY = e.clientY;
  if (drag){ target += (lastY - e.clientY) * 4.2; lastY = e.clientY; clampT(); }
});
addEventListener('pointerup', function(){ drag = false;
  document.body.classList.remove('dragging'); });
addEventListener('keydown', function(e){
  if (e.code === 'KeyW' || e.code === 'ArrowUp'){ target += 170; clampT(); }
  if (e.code === 'KeyS' || e.code === 'ArrowDown'){ target -= 170; clampT(); }
  if (e.code === 'Space'){ auto = !auto; e.preventDefault(); }
  if (e.code === 'Escape') closeFocus();
});

var depthEl = document.getElementById('depth');
function hud(){
  var f = cam / SPACING - 1;
  var i0 = Math.max(0, Math.min(DATA.length - 1, Math.floor(f)));
  var i1 = Math.max(0, Math.min(DATA.length - 1, Math.ceil(f)));
  var t = Math.max(0, Math.min(1, f - i0));
  var days = DATA[i0].days_ago + (DATA[i1].days_ago - DATA[i0].days_ago) * t;
  if (f < 0) days = 0;
  var near = DATA[Math.max(0, Math.min(DATA.length - 1, Math.round(f)))];
  var n = Math.round(days);
  depthEl.innerHTML = '&gt; ' + (n < 10 ? '00' + n : n < 100 ? '0' + n : n)
    + (n === 1 ? ' day ago' : ' days ago') + '<br>' + near.day;
}

// pixel canvases: rendered at 1/PIX resolution, upscaled with
// image-rendering: pixelated — every 1px draw lands as a chunky block
var cv = document.getElementById('stars'), ctx = cv.getContext('2d');
var sw = document.getElementById('swarm'), swx = sw.getContext('2d');
function fit(){
  cv.width = sw.width = Math.ceil(innerWidth / PIX);
  cv.height = sw.height = Math.ceil(innerHeight / PIX);
}
addEventListener('resize', fit); fit();
var STAR_TINTS = ['#ffffff', '#e9e9e9', '#7a7a7a', '#3e3e3e'];
var stars = [], meteors = [];
for (var i = 0; i < 240; i++) stars.push({ x: Math.random(), y: Math.random(),
  d: 0.25 + Math.random() * 0.75, tw: Math.random() * 6.28,
  c: STAR_TINTS[i % 4] });
function drawStars(now){
  ctx.clearRect(0, 0, cv.width, cv.height);
  var warp = Math.min(7, Math.abs(vel) * 0.2);
  var hw = cv.width / 2, hh = cv.height / 2;
  stars.forEach(function(s){
    s.y += 0.00002 + Math.abs(vel) * 0.000012 * s.d;
    if (s.y > 1) s.y -= 1;
    var px = (s.x * cv.width) | 0, py = (s.y * cv.height) | 0;
    // binary twinkle, no smooth fades — pixels are either lit or dim
    ctx.globalAlpha = Math.sin(now * 0.0011 + s.tw) > 0 ? 1 : 0.45;
    ctx.fillStyle = s.c;
    if (warp > 1.2){
      var dx = (px - hw) / cv.width, dy = (py - hh) / cv.height;
      var len = 1 + (warp * 4 * s.d | 0);
      for (var k = 0; k < len; k++)
        ctx.fillRect((px + dx * k * 2) | 0, (py + dy * k * 2) | 0, 1, 1);
    } else {
      var size = s.d > 0.72 ? 2 : 1;
      ctx.fillRect(px, py, size, size);
    }
  });
  if (Math.random() < 0.004 && meteors.length < 2)
    meteors.push({ x: Math.random() * 0.8 + 0.1, y: Math.random() * 0.3,
      vx: 0.004 + Math.random() * 0.004, vy: 0.002 + Math.random() * 0.003,
      life: 1 });
  meteors = meteors.filter(function(m){ return m.life > 0; });
  meteors.forEach(function(m){
    m.x += m.vx; m.y += m.vy; m.life -= 0.012;
    // stepped pixel trail instead of a gradient line
    for (var k = 0; k < 6; k++){
      ctx.globalAlpha = quant(Math.max(0, m.life - k * 0.13), 4);
      ctx.fillStyle = '#fff';
      ctx.fillRect(((m.x - m.vx * k * 2.4) * cv.width) | 0,
                   ((m.y - m.vy * k * 2.4) * cv.height) | 0, 1, 1);
    }
  });
  ctx.globalAlpha = 1;
}

// mouse pixel cluster: spring-tethered squares, blinking, mostly white
// with the occasional kimi-blue pixel
var SWARM_TINTS = ['#ffffff', '#e9e9e9', '#7a7a7a', '#1783ff'];
var swarm = [];
for (var i = 0; i < 22; i++) swarm.push({
  x: innerWidth / 2, y: innerHeight / 2, vx: 0, vy: 0,
  k: 0.02 + Math.random() * 0.06, damp: 0.82 + Math.random() * 0.08,
  s: Math.random() < 0.25 ? 2 : 1, c: SWARM_TINTS[i % 4],
  ph: Math.random() * 6.28, orb: 7 + Math.random() * 30 });
function drawSwarm(now){
  swx.clearRect(0, 0, sw.width, sw.height);
  swarm.forEach(function(p, i){
    var spin = now * 0.001 * (0.5 + p.k * 9) + p.ph;
    var tx = mouseX + Math.cos(spin) * p.orb;
    var ty = mouseY + Math.sin(spin * 1.13) * p.orb * 0.8;
    p.vx = (p.vx + (tx - p.x) * p.k) * p.damp;
    p.vy = (p.vy + (ty - p.y) * p.k) * p.damp;
    p.x += p.vx; p.y += p.vy;
    swx.globalAlpha = Math.sin(now * 0.004 + i) > -0.6 ? 1 : 0;
    swx.fillStyle = p.c;
    swx.fillRect((p.x / PIX) | 0, (p.y / PIX) | 0, p.s, p.s);
  });
  swx.globalAlpha = 1;
}

function tick(now){
  if (auto){ target += 1.6; clampT(); }
  var prev = cam;
  cam += (target - cam) * 0.075;
  vel = cam - prev;
  lookX += (-mX * 8 - lookX) * 0.05;
  lookY += (mY * 6 - lookY) * 0.05;
  var roll = Math.cos(-cam * CK) * CA * CK * 26;
  world.style.transform = 'rotateX(' + lookY.toFixed(2) + 'deg) rotateY('
    + lookX.toFixed(2) + 'deg) rotateZ(' + roll.toFixed(2)
    + 'deg) translate3d(' + (-bendX(-cam)).toFixed(1) + 'px,'
    + (-bendY(-cam)).toFixed(1) + 'px,' + cam.toFixed(1) + 'px)';
  items.forEach(function(it){
    var dz = it.z + cam;
    var o;
    if (dz > -50) o = Math.max(0, 1 - (dz + 50) / 150);
    else o = Math.max(0, 1 - (-dz - 50) / 4200);
    o = quant(o, 5);  // stepped fades: depth reads as dither bands
    if (o <= 0){ it.el.style.visibility = 'hidden'; }
    else { it.el.style.visibility = 'visible'; it.el.style.opacity = o; }
  });
  hud();
  drawStars(now || 0);
  drawSwarm(now || 0);
  requestAnimationFrame(tick);
}
requestAnimationFrame(tick);

var focusEl = document.getElementById('focus');
function openFocus(c){
  var html = '<div class="m">' + c.sha + ' · ' + c.date + ' · '
    + (c.days_ago === 0 ? 'today' : c.days_ago + ' days ago') + '</div>'
    + '<h2>' + esc(c.subject) + '</h2>';
  if (c.what) html += '<div class="lbl">改了什么 — What</div><p>'
    + esc(c.what) + '</p>';
  if (c.why) html += '<div class="lbl">为什么 — Why</div><p>'
    + esc(c.why) + '</p>';
  if (c.decisions.length){
    html += '<div class="lbl">决定 — Decisions</div><ol>';
    c.decisions.forEach(function(d){ html += '<li>' + esc(d) + '</li>'; });
    html += '</ol>';
  }
  if (c.risks.length){
    html += '<div class="lbl">未验证 — Open</div><ol class="open">';
    c.risks.forEach(function(r){ html += '<li>' + esc(r) + '</li>'; });
    html += '</ol>';
  }
  if (!c.what && !c.why)
    html += '<p class="dim">这枚 commit 尚未被叙事。回到终端执行 vibetrace digest。</p>';
  html += '<div class="m close-hint">[ESC] / 点击隧道返回</div>';
  focusEl.innerHTML = html;
  focusEl.classList.add('open');
}
function closeFocus(){ focusEl.classList.remove('open'); }
document.getElementById('viewport').addEventListener('click', closeFocus);
focusEl.addEventListener('click', function(e){ e.stopPropagation(); });
</script>
</body></html>
